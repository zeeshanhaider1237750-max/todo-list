name: Automated GitHub Pages Deployment

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Project Tooling Dependencies
        run: npm install

      - name: Compile Production Webpack Bundle
        run: npm run build

      - name: Upload Compiled Distribution Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy Live Assets to GitHub Pages
        uses: actions/deploy-pages@v4
