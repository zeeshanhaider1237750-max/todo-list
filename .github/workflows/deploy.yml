name: Automated GitHub Pages Deployment

on:
  push:
    branches:
      - main # Triggers the action every time you push code to your main branch

permissions:
  contents: write # Gives the script permission to write your dist folder to your gh-pages branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/workspace/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Project Tooling Dependencies
        run: npm install

      - name: Compile Production Webpack Bundle
        run: npm run build

      - name: Deploy Live Assets to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
